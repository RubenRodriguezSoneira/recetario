{{define "header"}}
<header class="site-header">
    <div class="container header-inner">
        <a href="/" class="site-logo">
            <span class="logo-icon">🍳</span>
            Recipe<span>Book</span>
        </a>

        <nav class="site-nav">
            <a href="/" class="nav-link">Inicio</a>
            <a href="/recipes" class="nav-link">Recetas</a>
            {{if .User}}
                <a href="/recipes/new" class="btn-primary">+ Nueva receta</a>
                <div class="user-menu">
                    <button class="user-menu-btn">
                        👤 {{.User.Username}} ▾
                    </button>
                    <div class="user-dropdown">
                        <a href="/api/users/profile">Mi perfil</a>
                        <form hx-post="/api/auth/logout" hx-target="body" hx-swap="outerHTML">
                            <button type="submit">Cerrar sesión</button>
                        </form>
                    </div>
                </div>
            {{else}}
                <button onclick="showLoginModal()" class="btn-secondary">Entrar</button>
                <button onclick="showRegisterModal()" class="btn-primary">Registrarse</button>
            {{end}}
        </nav>

        <button class="mobile-menu-btn btn-secondary" onclick="toggleMobileMenu()" id="mobile-menu-btn" aria-label="Abrir menú" aria-expanded="false">
            ☰
        </button>
    </div>
</header>

<!-- Login Modal -->
<div id="loginModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h2 class="modal-title">Bienvenido de vuelta</h2>
        <form hx-post="/api/auth/login" hx-target="#loginModal" hx-swap="innerHTML">
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="tu@email.com" class="form-input">
            </div>
            <div class="form-group" style="margin-bottom:1.75rem;">
                <label class="form-label" for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" class="form-input">
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem;">
                <button type="submit" class="btn-primary" style="flex:1; justify-content:center; padding:0.7rem;">Entrar</button>
                <button type="button" onclick="hideLoginModal()" class="btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Register Modal -->
<div id="registerModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h2 class="modal-title">Crear una cuenta</h2>
        <form hx-post="/api/auth/register" hx-target="#registerModal" hx-swap="innerHTML">
            <div class="form-group">
                <label class="form-label" for="regName">Nombre</label>
                <input type="text" id="regName" name="name" required placeholder="Tu nombre" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label" for="regEmail">Email</label>
                <input type="email" id="regEmail" name="email" required placeholder="tu@email.com" class="form-input">
            </div>
            <div class="form-group" style="margin-bottom:1.75rem;">
                <label class="form-label" for="regPassword">Contraseña</label>
                <input type="password" id="regPassword" name="password" required placeholder="••••••••" class="form-input">
            </div>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:1rem;">
                <button type="submit" class="btn-primary" style="flex:1; justify-content:center; padding:0.7rem;">Registrarse</button>
                <button type="button" onclick="hideRegisterModal()" class="btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>
{{end}}
