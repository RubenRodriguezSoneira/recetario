{{range .recipes}}
<div class="recipe-card fade-in">
    <div class="recipe-card-thumb">
        🍲
    </div>
    <div class="recipe-card-body">
        <h3 class="recipe-card-title">{{.title}}</h3>
        <p class="recipe-card-desc">{{.description}}</p>
        <div class="recipe-card-meta">
            <span class="meta-chip">⏱ {{.cook_time}} min</span>
            <span class="difficulty-badge {{.difficulty}}">{{.difficulty}}</span>
        </div>
        <div style="display:flex; align-items:center; gap:0.65rem; flex-wrap:wrap;">
            <a href="/recipes/{{.id}}" class="recipe-card-link">Ver receta →</a>
            {{if .is_owner}}
            <a href="/recipes/{{.id}}/edit" class="btn-secondary" style="padding:0.35rem 0.7rem; margin-left:auto;">✏️ Editar</a>
            <button class="btn-danger" onclick="deleteRecipe('{{.id}}', this)" style="padding:0.35rem 0.7rem;">Eliminar</button>
            {{end}}
        </div>
    </div>
</div>
{{else}}
<div class="empty-state" style="grid-column: 1/-1;">
    <span class="empty-icon">🍽️</span>
    <p>Aún no hay recetas guardadas.</p>
    <a href="/recipes/new" class="btn-primary">Crear la primera receta</a>
</div>
{{end}}
