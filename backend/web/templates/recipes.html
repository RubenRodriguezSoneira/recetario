{{define "content"}}
<div style="display: flex; gap: 2rem; align-items: flex-start;">
    <!-- Sidebar -->
    <aside style="width: 260px; flex-shrink: 0;">
        <div class="filter-panel">
            <h3>Filtros</h3>

            <div class="filter-group">
                <label class="filter-label">Buscar</label>
                <input type="text" id="searchInput" name="q"
                       placeholder="Nombre de la receta…"
                       hx-get="/api/recipes"
                       hx-trigger="keyup changed delay:400ms"
                       hx-target="#recipe-grid"
                       hx-include="[name='cook_time'], [name='difficulty']"
                       class="input-field">
            </div>

            <div class="filter-group">
                <label class="filter-label">Tiempo de cocción</label>
                <select name="cook_time"
                        hx-get="/api/recipes"
                        hx-trigger="change"
                        hx-target="#recipe-grid"
                        hx-include="#searchInput, [name='difficulty']"
                        class="select-field">
                    <option value="">Cualquiera</option>
                    <option value="30">Menos de 30 min</option>
                    <option value="60">Menos de 1 hora</option>
                    <option value="120">Menos de 2 horas</option>
                </select>
            </div>

            <div class="filter-group">
                <label class="filter-label">Dificultad</label>
                <select name="difficulty"
                        hx-get="/api/recipes"
                        hx-trigger="change"
                        hx-target="#recipe-grid"
                        hx-include="#searchInput, [name='cook_time']"
                        class="select-field">
                    <option value="">Cualquiera</option>
                    <option value="easy">Fácil</option>
                    <option value="medium">Media</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>
        </div>
    </aside>

    <!-- Main content -->
    <div style="flex: 1; min-width: 0;">
        <div class="section-header">
            <h1 class="section-title">Todas las recetas</h1>
            {{if .User}}
                <a href="/recipes/new" class="btn-primary">+ Nueva receta</a>
            {{end}}
        </div>

        <div id="recipe-grid"
             hx-get="/api/recipes"
             hx-trigger="load"
             class="recipe-grid">
            <div style="grid-column:1/-1; text-align:center; padding:3rem; color: var(--ink-light);">
                <div class="spinner" style="margin: 0 auto 1rem;"></div>
                Cargando recetas…
            </div>
        </div>
    </div>
</div>
{{end}}
